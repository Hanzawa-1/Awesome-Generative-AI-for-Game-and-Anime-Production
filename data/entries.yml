  - motion-modeling
  - vfi
  summary: Introduces Generalizable Implicit Motion Modeling (GIMM), which encodes spatiotemporal motion latents from bidirectional flows to effectively represent input-specific motion priors for frame interpolation.
  summary_ja: 双方向フローから時空間的な動きの潜在変数をエンコードし、フレーム補間のための入力固有の動きの事前分布を効果的に表現する、汎用的な暗黙的運動モデリング（GIMM）を提案。
