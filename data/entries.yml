  summary: A state-of-the-art diffusion-based video frame interpolation model designed to handle complex and large-motion scenarios. It utilizes a transformer-based token design to generate sharp, temporally consistent intermediate frames without the typical blurriness of flow-based methods.
  summary_ja: 複雑で大きな動きを伴うシナリオに対応するために設計された、最先端の拡散ベースのビデオフレーム補間モデル。トランスフォーマーベースのトークン設計を利用して、従来のフローベースの手法に見られるブレを排除し、鮮明で時間的一貫性のある中間フレームを生成します。
