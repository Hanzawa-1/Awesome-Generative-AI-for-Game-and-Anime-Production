- id: generative-inbetweening-adapting-image-to-video-models-for-k-6fa9c3
  title: 'Generative Inbetweening: Adapting Image-to-Video Models for Keyframe Interpolation'
  area: animation
  task: inbetweening
  kind: oss
  links:
    arxiv: https://arxiv.org/abs/2408.15239
