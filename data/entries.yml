  summary_ja: 2つの入力キーフレーム間の時間的一貫性と動きのコヒーレンスを大幅に向上させるために、フレームごとの条件付けを利用してビデオ拡散モデルをガイドする生成的なインビトウィーニング（中割り）フレームワーク。
