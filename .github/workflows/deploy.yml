name: Deploy site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DISABLE_MKDOCS_2_WARNING: "true"
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Install dependencies
        run: uv sync --no-dev
      - name: Validate data
        run: uv run python scripts/validate.py
      - name: Generate catalog pages
        run: uv run python scripts/gen_catalog.py
      - name: Build site
        run: uv run mkdocs build --strict
      # One-time manual step required first: Settings -> Pages -> Source ->
      # "GitHub Actions". The GITHUB_TOKEN cannot create a Pages site itself
      # (that's a repo-admin op), so enablement: true would fail.
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
