site_name: Awesome Generative AI for Game & Anime Production
site_description: >-
  A curated, agent-updated catalog of generative-AI tasks for game and anime
  production — open-source models & papers plus the proprietary tools studios use.
# Update these after you create the GitHub repo / enable Pages:
site_url: https://example.github.io/awesome-genai-game-anime/
repo_url: https://github.com/example/awesome-genai-game-anime
repo_name: awesome-genai-game-anime
edit_uri: edit/main/

# Stable, depth-independent relative links between generated pages and assets.
use_directory_urls: false

theme:
  name: material
  language: en
  icon:
    repo: fontawesome/brands/github
  font:
    text: Source Serif 4
    code: Space Mono
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.tracking
    - search.suggest
    - search.highlight
    - content.action.edit
    - toc.follow
  palette:
    scheme: default
    primary: white
    accent: indigo

extra_css:
  - stylesheets/extra.css

plugins:
  - search:
      lang:
        - en
        - ja
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      reconfigure_search: true
      languages:
        - locale: en
          default: true
          name: English
          build: true
        - locale: ja
          name: 日本語
          build: true
  # literate-nav MUST come after i18n so it builds the per-locale nav from the
  # SUMMARY.md / SUMMARY.ja.md files that i18n has already resolved.
  - literate-nav:
      nav_file: SUMMARY.md

markdown_extensions:
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
